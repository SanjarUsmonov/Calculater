<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="../dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css" integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-bg">
    <div class="flex w-full justify-center items-center h-screen font-[Dosis]">
        <div class="w-width h-5/6  bg-white rounded-3xl m-14">
            <h2 class="text-5xl pt-10 pl-10 text-green">Calcolatrice</h2>
            <div class="text-end mr-7">
                <p class="text-3xl">23 x 50</p>
                <h1 class="text-7xl">1.150</h1>
            </div>
            <p class="text-center w-20 h-1 bg-bg rounded-2xl mx-auto mb-2"></p>
            <div class="box w-width h-2/3 bg-cardbg rounded-b-3xl flex flex-wrap text-center text-3xl justify-between items-center">
                <p class="w-1/4 h-5 bg-transparent text-word">C</p>
                <p class="w-1/4 h-5 bg-transparent"><i class="fa-solid fa-delete-left"></i></p>
                <p class="w-1/4 h-5 bg-transparent">%</p>
                <p class="w-1/4 h-5 bg-transparent text-word text-5xl">/</p>
                <p class="w-1/4 h-5 bg-transparent">7</p>
                <p class="w-1/4 h-5 bg-transparent">8</p>
                <p class="w-1/4 h-5 bg-transparent">9</p>
                <p class="w-1/4 h-5 bg-transparent text-word"><i class="fa-solid fa-x"></i></p>
                <p class="w-1/4 h-5 bg-transparent">4</p>
                <p class="w-1/4 h-5 bg-transparent">5</p>
                <p class="w-1/4 h-5 bg-transparent">6</p>
                <p class="w-1/4 h-5 bg-transparent text-word"><i class="fa-solid fa-minus"></i></p>
                <p class="w-1/4 h-5 bg-transparent">1</p>
                <p class="w-1/4 h-5 bg-transparent">2</p>
                <p class="w-1/4 h-5 bg-transparent">3</p>
                <p class="w-1/4 h-5 bg-transparent text-word"><i class="fa-solid fa-plus"></i></p>
                <p class="stacked-fractions w-1/4 h-5 bg-transparent text-xl">con/log</p>
                <p class="w-1/4 h-5 bg-transparent">0</p>
                <p class="w-1/4 h-5 bg-transparent">,</p>
                <p class="w-1/4 h-5 bg-transparent text-word"><i class="fa-solid fa-grip-lines"></i></p>
            </div>
        </div>
        <div class="w-width h-5/6  bg-card rounded-3xl m-14 text-white">
            <h2 class="text-5xl pt-10 pl-10 text-word">Calcolatrice</h2>
            <div class="text-end mr-7">
                <p class="text-3xl">23 x 50</p>
                <h1 class="text-7xl">1.150</h1>
            </div>
            <p class="text-center w-20 h-1 bg-bg rounded-2xl mx-auto mb-2"></p>
            <div class="box w-width h-2/3 bg-cardtwobg rounded-b-3xl flex flex-wrap text-center text-3xl justify-between items-center">
                <p class="w-1/4 h-5 bg-transparent text-wordtwo">C</p>
                <p class="w-1/4 h-5 bg-transparent"><i class="fa-solid fa-delete-left"></i></p>
                <p class="w-1/4 h-5 bg-transparent">%</p>
                <p class="w-1/4 h-5 bg-transparent text-wordtwo text-5xl">/</p>
                <p class="w-1/4 h-5 bg-transparent">7</p>
                <p class="w-1/4 h-5 bg-transparent">8</p>
                <p class="w-1/4 h-5 bg-transparent">9</p>
                <p class="w-1/4 h-5 bg-transparent text-wordtwo"><i class="fa-solid fa-x"></i></p>
                <p class="w-1/4 h-5 bg-transparent">4</p>
                <p class="w-1/4 h-5 bg-transparent">5</p>
                <p class="w-1/4 h-5 bg-transparent">6</p>
                <p class="w-1/4 h-5 bg-transparent text-wordtwo"><i class="fa-solid fa-minus"></i></p>
                <p class="w-1/4 h-5 bg-transparent">1</p>
                <p class="w-1/4 h-5 bg-transparent">2</p>
                <p class="w-1/4 h-5 bg-transparent">3</p>
                <p class="w-1/4 h-5 bg-transparent text-wordtwo"><i class="fa-solid fa-plus"></i></p>
                <p class="stacked-fractions w-1/4 h-5 bg-transparent text-xl">con/log</p>
                <p class="w-1/4 h-5 bg-transparent">0</p>
                <p class="w-1/4 h-5 bg-transparent">,</p>
                <p class="w-1/4 h-5 bg-transparent text-wordtwo"><i class="fa-solid fa-grip-lines"></i></p>
            </div>
        </div>
    </div>
</body>
</html>
